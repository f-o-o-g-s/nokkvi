# Navidrome Client Configuration - Catppuccin Theme
# Dark mode: Mocha (darkest) | Light mode: Latte
# All colors from official Catppuccin spec: https://github.com/catppuccin/catppuccin

# REPLACE THESE WITH YOUR CREDENTIALS
server_url = "http://localhost:4533"
username = ""

# ============================================================================
# CATPPUCCIN MOCHA (Dark Mode) - Darkest flavor
# ============================================================================

[theme.dark.accent]
# Lavender is the signature Catppuccin accent (used for active borders per style guide)
border_dark = "#b4befe"
border_light = "#cdd6f4"
bright = "#cdd6f4"
primary = "#b4befe"

[theme.dark.aqua]
# Teal from Catppuccin
bright = "#94e2d5"
normal = "#8bd5ca"

[theme.dark.background]
# Mocha backgrounds: Crust (darkest) -> Base -> Surface0 -> Surface1 -> Surface2 -> Overlay
default = "#1e1e2e"
hard = "#11111b"
level1 = "#313244"
level2 = "#45475a"
level3 = "#585b70"
level4 = "#6c7086"
soft = "#181825"

[theme.dark.foreground]
# Mocha text hierarchy: Text -> Subtext1 -> Subtext0 -> Overlay
bright = "#cdd6f4"
gray = "#6c7086"
level1 = "#cdd6f4"
level2 = "#bac2de"
level3 = "#a6adc8"
level4 = "#9399b2"

[theme.dark.green]
bright = "#a6e3a1"
normal = "#a6da95"

[theme.dark.orange]
# Peach from Catppuccin
bright = "#fab387"
normal = "#f5a97f"

[theme.dark.purple]
# Mauve from Catppuccin
bright = "#cba6f7"
normal = "#c6a0f6"

[theme.dark.red]
bright = "#f38ba8"
normal = "#ed8796"

[theme.dark.yellow]
bright = "#f9e2af"
normal = "#eed49f"

# ============================================================================
# CATPPUCCIN LATTE (Light Mode) - The light flavor
# ============================================================================

[theme.light.accent]
# Lavender accent for light mode
# border_light must be LIGHTER than border_dark for 3D handle effect
border_dark = "#5c5f77"
border_light = "#bcc0cc"
bright = "#7287fd"
primary = "#7287fd"

[theme.light.aqua]
# Teal from Catppuccin Latte
bright = "#179299"
normal = "#209fb5"

[theme.light.background]
# Latte backgrounds - for light mode, "hard" should be DARKEST for header contrast
# Progression: hard (darkest) -> soft -> default -> level1 -> level2 -> level3 -> level4 (lightest surface)
default = "#e6e9ef"
hard = "#dce0e8"
level1 = "#ccd0da"
level2 = "#bcc0cc"
level3 = "#acb0be"
level4 = "#9ca0b0"
soft = "#eff1f5"

[theme.light.foreground]
# Latte text hierarchy: Text -> Subtext1 -> Subtext0 -> Overlay
bright = "#4c4f69"
gray = "#9ca0b0"
level1 = "#4c4f69"
level2 = "#5c5f77"
level3 = "#6c6f85"
level4 = "#7c7f93"

[theme.light.green]
bright = "#40a02b"
normal = "#40a02b"

[theme.light.orange]
# Peach from Catppuccin Latte
bright = "#fe640b"
normal = "#fe640b"

[theme.light.purple]
# Mauve from Catppuccin Latte
bright = "#8839ef"
normal = "#8839ef"

[theme.light.red]
bright = "#d20f39"
normal = "#d20f39"

[theme.light.yellow]
bright = "#df8e1d"
normal = "#df8e1d"

[theme.font]
family = "JetBrainsMono Nerd Font"

# ============================================================================
# VISUALIZER
# ============================================================================


[visualizer]
higher_cutoff_freq = 10000

lower_cutoff_freq = 50
monstercat = 0.0
noise_reduction = 0.77
waves = false

# Dark mode visualizer: Lavender → Pink → Sapphire gradient (pastel dream)

[visualizer.bars]
bar_spacing = 2.0
gradient_mode = "wave"
border_width = 1.0
led_bars = true
led_segment_height = 2.0
peak_gradient_mode = "cycle"
peak_mode = "fall"
peak_hold_time = 500
peak_fade_time = 750
bar_depth_3d = 0.0
peak_height_ratio = 66

[visualizer.bars.dark]
border_color = "#11111b"
border_opacity = 1.0
led_border_opacity = 1.0
bar_gradient_colors = [
    "#b4befe",
    "#b4befe",
    "#f5c2e7",
    "#f5c2e7",
    "#74c7ec",
    "#74c7ec",
]
peak_gradient_colors = [
    "#f9e2af",
    "#f9e2af",
    "#fab387",
    "#fab387",
    "#fab387",
    "#fab387",
]

[visualizer.bars.light]
border_color = "#eff1f5"
border_opacity = 0.0
led_border_opacity = 0.0
bar_gradient_colors = [
    "#7287fd",
    "#7287fd",
    "#ea76cb",
    "#ea76cb",
    "#209fb5",
    "#209fb5",
]
peak_gradient_colors = [
    "#df8e1d",
    "#df8e1d",
    "#fe640b",
    "#fe640b",
    "#fe640b",
    "#fe640b",
]

[visualizer.lines]
line_thickness = 0.025
point_count = 32

