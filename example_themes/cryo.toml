# ─────────────── VISUALIZER ───────────────


[visualizer]
higher_cutoff_freq = 11000
lower_cutoff_freq = 40

monstercat = 0.0
noise_reduction = 0.8
waves = false


[visualizer.bars]
bar_spacing = 2.0
gradient_mode = "wave"
border_width = 1.0
led_bars = true
led_segment_height = 2.0
peak_gradient_mode = "cycle"
peak_mode = "fall"
peak_hold_time = 500
peak_fade_time = 750
bar_depth_3d = 0.0
peak_height_ratio = 66

[visualizer.bars.dark]
border_color = "#0a0f14"
border_opacity = 1.0
led_border_opacity = 1
bar_gradient_colors = [
    "#5cc8ff",
    "#3a86c6",
    "#3a86c6",
    "#2aa198",
    "#4fd6c8",
]
peak_gradient_colors = [
    "#ff6b81",
    "#bfa6ff",
    "#ffd866",
    "#ff9f6e",
]

[visualizer.bars.light]
border_color = "#e9f1fb"
border_opacity = 0.0
led_border_opacity = 0.0
bar_gradient_colors = [
    "#3a86c6",
    "#245a8d",
    "#245a8d",
    "#1f7f78",
    "#2aa198",
]
peak_gradient_colors = [
    "#b3364a",
    "#6f5ab3",
    "#c9a13f",
    "#e07a3f",
]

[visualizer.lines]
line_thickness = 0.025
point_count = 32

