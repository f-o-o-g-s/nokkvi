# Navidrome Client Configuration - Nord Theme
# An arctic, north-bluish color palette
# All colors from official Nord spec: https://www.nordtheme.com
# 
# Nord has 4 palettes:
#   - Polar Night (nord0-3): Dark backgrounds
#   - Snow Storm (nord4-6): Light foregrounds  
#   - Frost (nord7-10): Bluish accent colors
#   - Aurora (nord11-15): Colorful accents

# REPLACE THESE WITH YOUR CREDENTIALS
server_url = "http://localhost:4533"
username = ""

# ============================================================================
# NORD DARK MODE (Polar Night backgrounds)
# ============================================================================

[theme.dark.accent]
# nord8 (Frost) - The main accent color
border_dark = "#5e81ac"
border_light = "#88c0d0"
bright = "#88c0d0"
primary = "#81a1c1"

[theme.dark.aqua]
# nord7 (Frost - cyan/teal)
bright = "#8fbcbb"
normal = "#8fbcbb"

[theme.dark.background]
# Polar Night palette
default = "#2e3440"
hard = "#242933"
level1 = "#3b4252"
level2 = "#434c5e"
level3 = "#4c566a"
level4 = "#5a657a"
soft = "#2e3440"

[theme.dark.foreground]
# Snow Storm palette
bright = "#eceff4"
gray = "#4c566a"
level1 = "#eceff4"
level2 = "#e5e9f0"
level3 = "#d8dee9"
level4 = "#c8ceda"

[theme.dark.green]
# nord14 (Aurora - green)
bright = "#a3be8c"
normal = "#a3be8c"

[theme.dark.orange]
# nord12 (Aurora - orange)
bright = "#d08770"
normal = "#d08770"

[theme.dark.purple]
# nord15 (Aurora - purple)
bright = "#b48ead"
normal = "#b48ead"

[theme.dark.red]
# nord11 (Aurora - red)
bright = "#bf616a"
normal = "#bf616a"

[theme.dark.yellow]
# nord13 (Aurora - yellow)
bright = "#ebcb8b"
normal = "#ebcb8b"

# ============================================================================
# NORD LIGHT MODE (Snow Storm backgrounds)
# ============================================================================

[theme.light.accent]
# nord8/9 (Frost) for light mode
border_dark = "#5e81ac"
border_light = "#d8dee9"
bright = "#5e81ac"
primary = "#5e81ac"

[theme.light.aqua]
# nord7 (Frost)
bright = "#8fbcbb"
normal = "#8fbcbb"

[theme.light.background]
# Snow Storm for backgrounds (inverted for light mode)
default = "#e5e9f0"
hard = "#d8dee9"
level1 = "#d8dee9"
level2 = "#c8ceda"
level3 = "#b8c4d4"
level4 = "#a8b4c4"
soft = "#eceff4"

[theme.light.foreground]
# Polar Night for text in light mode
bright = "#2e3440"
gray = "#7b88a1"
level1 = "#2e3440"
level2 = "#3b4252"
level3 = "#434c5e"
level4 = "#4c566a"

[theme.light.green]
# nord14 (Aurora)
bright = "#a3be8c"
normal = "#7b9a5e"

[theme.light.orange]
# nord12 (Aurora)
bright = "#d08770"
normal = "#c06050"

[theme.light.purple]
# nord15 (Aurora)
bright = "#b48ead"
normal = "#a47e9d"

[theme.light.red]
# nord11 (Aurora)
bright = "#bf616a"
normal = "#a5414a"

[theme.light.yellow]
# nord13 (Aurora)
bright = "#ebcb8b"
normal = "#dbbb7b"

[theme.font]
family = "JetBrainsMono Nerd Font"

# ============================================================================
# VISUALIZER
# ============================================================================


[visualizer]
higher_cutoff_freq = 10000

lower_cutoff_freq = 50
monstercat = 0.0
noise_reduction = 0.77
waves = false

# Dark mode visualizer: Frost blues gradient

[visualizer.bars]
bar_spacing = 2.0
gradient_mode = "wave"
border_width = 1.0
led_bars = true
led_segment_height = 2.0
peak_gradient_mode = "cycle"
peak_mode = "fall"
peak_hold_time = 500
peak_fade_time = 750
bar_depth_3d = 0.0
peak_height_ratio = 66

[visualizer.bars.dark]
border_color = "#242933"
border_opacity = 1.0
led_border_opacity = 1.0
bar_gradient_colors = [
    "#5e81ac",
    "#5e81ac",
    "#81a1c1",
    "#81a1c1",
    "#88c0d0",
    "#8fbcbb",
]
peak_gradient_colors = [
    "#ebcb8b",
    "#ebcb8b",
    "#d08770",
    "#d08770",
    "#bf616a",
    "#bf616a",
]

[visualizer.bars.light]
border_color = "#eceff4"
border_opacity = 0.0
led_border_opacity = 0.0
bar_gradient_colors = [
    "#5e81ac",
    "#5e81ac",
    "#81a1c1",
    "#81a1c1",
    "#88c0d0",
    "#8fbcbb",
]
peak_gradient_colors = [
    "#ebcb8b",
    "#ebcb8b",
    "#d08770",
    "#d08770",
    "#bf616a",
    "#bf616a",
]

[visualizer.lines]
line_thickness = 0.025
point_count = 32

