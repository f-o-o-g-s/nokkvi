# =========================
# Visualizer
# =========================


[visualizer]
lower_cutoff_freq = 45
higher_cutoff_freq = 11000
noise_reduction = 0.85

monstercat = 0.0
waves = false

# -------- DARK BARS --------


[visualizer.bars]
bar_spacing = 2
border_width = 1
led_bars = true
led_segment_height = 3
gradient_mode = "wave"
peak_gradient_mode = "cycle"
peak_mode = "fall"
peak_hold_time = 500
peak_fade_time = 750
bar_depth_3d = 0.0
peak_height_ratio = 66

[visualizer.bars.dark]
border_color = "#0c0a09"
border_opacity = 1.0
led_border_opacity = 1
bar_gradient_colors = [
    "#92400e",
    "#b45309",
    "#d97706",
    "#f59e0b",
    "#fde047",
    "#4ade80",
]
peak_gradient_colors = [
    "#7c2d12",
    "#b91c1c",
    "#ea580c",
    "#f59e0b",
    "#fde047",
    "#22c55e",
]

[visualizer.bars.light]
border_color = "#f5f5f4"
border_opacity = 0.0
led_border_opacity = 0.0
bar_gradient_colors = [
    "#a16207",
    "#b45309",
    "#c2410c",
    "#ea580c",
    "#ca8a04",
    "#22c55e",
]
peak_gradient_colors = [
    "#991b1b",
    "#c2410c",
    "#ea580c",
    "#ca8a04",
    "#16a34a",
    "#0d9488",
]

[visualizer.lines]
line_thickness = 0.03
point_count = 32

