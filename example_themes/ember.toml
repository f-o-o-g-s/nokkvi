hard = "#0c0a09"
soft = "#1c1917"
level1 = "#292524"
level2 = "#44403c"
level3 = "#57534e"
level4 = "#78716c"

[theme.dark.foreground]
bright = "#fafaf9"
gray = "#a8a29e"
level1 = "#e7e5e4"
level2 = "#d6d3d1"
