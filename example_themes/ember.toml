# Navidrome Client Configuration - Ember Dusk Theme
# A warm, fiery color palette

# REPLACE THESE WITH YOUR CREDENTIALS
server_url = "http://localhost:4533"
username = ""

# =========================
# Ember Dusk Theme
# =========================
