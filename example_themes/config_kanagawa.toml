# Navidrome Client Configuration - Kanagawa Theme
# Inspired by Katsushika Hokusai's "The Great Wave off Kanagawa"
# All colors from official spec: https://github.com/rebelot/kanagawa.nvim
#
# Kanagawa has 3 variants: Wave (dark), Dragon (darker), Lotus (light)
# This config uses Wave for dark mode and Lotus for light mode

# REPLACE THESE WITH YOUR CREDENTIALS
server_url = "http://localhost:4533"
username = ""

# ============================================================================
# KANAGAWA WAVE (Dark Mode) - The heart-warming default
# ============================================================================

[theme.dark.accent]
# crystalBlue - Functions and Titles
border_dark = "#658594"
border_light = "#7E9CD8"
bright = "#7E9CD8"
primary = "#7E9CD8"

[theme.dark.aqua]
# waveAqua colors
bright = "#7AA89F"
normal = "#6A9589"

[theme.dark.background]
# sumiInk backgrounds
default = "#1F1F28"
hard = "#16161D"
level1 = "#2A2A37"
level2 = "#363646"
level3 = "#54546D"
level4 = "#727169"
soft = "#1F1F28"

[theme.dark.foreground]
# fuji foregrounds
bright = "#DCD7BA"
gray = "#727169"
level1 = "#DCD7BA"
level2 = "#C8C093"
level3 = "#9CABCA"
level4 = "#938AA9"

[theme.dark.green]
# springGreen
bright = "#98BB6C"
normal = "#76946A"

[theme.dark.orange]
# surimiOrange
bright = "#FFA066"
normal = "#DCA561"

[theme.dark.purple]
# oniViolet
bright = "#957FB8"
normal = "#957FB8"

[theme.dark.red]
# waveRed / peachRed
bright = "#FF5D62"
normal = "#E46876"

[theme.dark.yellow]
# carpYellow / boatYellow
bright = "#E6C384"
normal = "#C0A36E"

# ============================================================================
# KANAGAWA LOTUS (Light Mode) - For when you're out in the open
# ============================================================================

[theme.light.accent]
# Lotus blue accents
border_dark = "#4d699b"
border_light = "#c8c8c8"
bright = "#4d699b"
primary = "#4d699b"

[theme.light.aqua]
bright = "#6693bf"
normal = "#597b8c"

[theme.light.background]
# Lotus light backgrounds (warm whites)
default = "#f2ecbc"
hard = "#e5ddb0"
level1 = "#e7dba0"
level2 = "#d5cea3"
level3 = "#c9c19e"
level4 = "#b5ada4"
soft = "#f9f3c3"

[theme.light.foreground]
# Lotus dark foregrounds
bright = "#545464"
gray = "#8a8980"
level1 = "#545464"
level2 = "#5d5d5d"
level3 = "#716e61"
level4 = "#8a8980"

[theme.light.green]
bright = "#6f894e"
normal = "#6f894e"

[theme.light.orange]
bright = "#e98a00"
normal = "#cc6d00"

[theme.light.purple]
bright = "#b35b79"
normal = "#8a4f7d"

[theme.light.red]
bright = "#d7474b"
normal = "#c84053"

[theme.light.yellow]
bright = "#de9800"
normal = "#a07400"
# ============================================================================
# VISUALIZER
# ============================================================================


[visualizer]
higher_cutoff_freq = 10000

lower_cutoff_freq = 50
monstercat = 0.0
noise_reduction = 0.77
waves = false

# Dark mode visualizer: Wave blues and aquas (like the great wave)

[visualizer.bars]
bar_spacing = 2.0
gradient_mode = "wave"
border_width = 1.0
led_bars = true
led_segment_height = 2.0
peak_gradient_mode = "cycle"
peak_mode = "fall"
peak_hold_time = 500
peak_fade_time = 750
bar_depth_3d = 0.0
peak_height_ratio = 66

[visualizer.bars.dark]
border_color = "#16161D"
border_opacity = 1.0
led_border_opacity = 1.0
bar_gradient_colors = [
    "#7E9CD8",
    "#7E9CD8",
    "#7FB4CA",
    "#7FB4CA",
    "#7AA89F",
    "#6A9589",
]
peak_gradient_colors = [
    "#E6C384",
    "#E6C384",
    "#FFA066",
    "#FFA066",
    "#FF5D62",
    "#E46876",
]

[visualizer.bars.light]
border_color = "#f9f3c3"
border_opacity = 0.0
led_border_opacity = 0.0
bar_gradient_colors = [
    "#4d699b",
    "#4d699b",
    "#597b8c",
    "#597b8c",
    "#6693bf",
    "#6693bf",
]
peak_gradient_colors = [
    "#a07400",
    "#a07400",
    "#cc6d00",
    "#cc6d00",
    "#c84053",
    "#c84053",
]

[visualizer.lines]
line_thickness = 0.025
point_count = 32

