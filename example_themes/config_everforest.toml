hard = "#EFEBD4"
level1 = "#E6E2CC"
level2 = "#E0DCC7"
level3 = "#BDC3AF"
level4 = "#A6B0A0"
soft = "#FDF6E3"

[theme.light.foreground]
# Dark foregrounds for light mode
bright = "#5C6A72"
gray = "#A6B0A0"
level1 = "#5C6A72"
level2 = "#708089"
level3 = "#829181"
level4 = "#939F91"

[theme.light.green]
# green for light mode
bright = "#8DA101"
normal = "#8DA101"

[theme.light.orange]
# orange for light mode
bright = "#F57D26"
normal = "#F57D26"

[theme.light.purple]
# purple for light mode
bright = "#DF69BA"
normal = "#DF69BA"

[theme.light.red]
# red for light mode
bright = "#F85552"
normal = "#F85552"

[theme.light.yellow]
# yellow for light mode
