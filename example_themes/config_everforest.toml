border_dark = "#5C6A72"
border_light = "#E6E2CC"
bright = "#93B259"
primary = "#8DA101"
now_playing = "#93B259"
selected = "#A6B0A0"

[theme.light.aqua]
# aqua for light mode
bright = "#35A77C"
normal = "#35A77C"

[theme.light.background]
# Light medium backgrounds (spread for contrast)
