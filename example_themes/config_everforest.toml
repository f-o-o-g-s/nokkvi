# Navidrome Client Configuration - Everforest Theme
# A comfortable green/forest color scheme
# All colors from official spec: https://github.com/sainnhe/everforest
#
# Everforest has dark and light variants with hard/medium/soft contrast options
# This config uses dark medium and light medium

# REPLACE THESE WITH YOUR CREDENTIALS
server_url = "http://localhost:4533"
username = ""

[theme]
light_mode = false

# ============================================================================
# EVERFOREST DARK MEDIUM
# ============================================================================

[theme.dark.accent]
# green accents + now-playing, grey for selected slot
border_dark = "#8DA101"
border_light = "#A7C080"
bright = "#A7C080"
primary = "#8DA101"
now_playing = "#A7C080"
selected = "#8CA16E"

[theme.dark.aqua]
# aqua from palette
bright = "#83C092"
normal = "#83C092"

[theme.dark.background]
# Dark medium backgrounds
default = "#2D353B"
hard = "#232A2E"
level1 = "#343F44"
level2 = "#3D484D"
level3 = "#475258"
level4 = "#4F585E"
soft = "#2D353B"

[theme.dark.foreground]
# Foreground colors
bright = "#D3C6AA"
gray = "#7A8478"
level1 = "#D3C6AA"
level2 = "#9DA9A0"
level3 = "#859289"
level4 = "#7A8478"

[theme.dark.green]
# green from palette
bright = "#A7C080"
normal = "#A7C080"

[theme.dark.orange]
# orange from palette
bright = "#E69875"
normal = "#E69875"

[theme.dark.purple]
# purple from palette
bright = "#D699B6"
normal = "#D699B6"

[theme.dark.red]
# red from palette
bright = "#E67E80"
normal = "#E67E80"

[theme.dark.yellow]
# yellow from palette
