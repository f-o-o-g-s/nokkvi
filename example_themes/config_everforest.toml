# Navidrome Client Configuration - Everforest Theme
# A comfortable green/forest color scheme
# All colors from official spec: https://github.com/sainnhe/everforest
#
# Everforest has dark and light variants with hard/medium/soft contrast options
# This config uses dark medium and light medium

# REPLACE THESE WITH YOUR CREDENTIALS
server_url = "http://localhost:4533"
username = ""

# ============================================================================
# EVERFOREST DARK MEDIUM
# ============================================================================

[theme.dark.accent]
# slightly darker green for playing, brighter green for selected
border_dark = "#93B070"
border_light = "#A7C080"
bright = "#A7C080"
primary = "#93B070"
now_playing = "#7FBBB3"

[theme.dark.aqua]
# aqua from palette
bright = "#83C092"
normal = "#83C092"

[theme.dark.background]
# Dark medium backgrounds
default = "#2D353B"
hard = "#232A2E"
level1 = "#343F44"
level2 = "#3D484D"
level3 = "#475258"
level4 = "#4F585E"
soft = "#333C43"

[theme.dark.foreground]
# Foreground colors
bright = "#D3C6AA"
gray = "#7A8478"
level1 = "#D3C6AA"
level2 = "#9DA9A0"
level3 = "#859289"
level4 = "#7A8478"

[theme.dark.green]
# green from palette
bright = "#A7C080"
normal = "#A7C080"

[theme.dark.orange]
# orange from palette
bright = "#E69875"
normal = "#E69875"

[theme.dark.purple]
# purple from palette
bright = "#D699B6"
normal = "#D699B6"

[theme.dark.red]
# red from palette
bright = "#E67E80"
normal = "#E67E80"

[theme.dark.yellow]
# yellow from palette
bright = "#DBBC7F"
normal = "#DBBC7F"

# ============================================================================
# EVERFOREST LIGHT MEDIUM
# ============================================================================

[theme.light.accent]
# green for light mode - adjusted for contrast
border_dark = "#5C6A72"
border_light = "#E6E2CC"
bright = "#8DA101"
primary = "#8DA101"

[theme.light.aqua]
# aqua for light mode
bright = "#35A77C"
normal = "#35A77C"

[theme.light.background]
# Light medium backgrounds
default = "#F4F0D9"
hard = "#E6E2CC"
level1 = "#E6E2CC"
level2 = "#E0DCC7"
level3 = "#D5CFBA"
level4 = "#BDC3AF"
soft = "#FDF6E3"

[theme.light.foreground]
# Dark foregrounds for light mode
bright = "#5C6A72"
gray = "#A6B0A0"
level1 = "#5C6A72"
level2 = "#708089"
level3 = "#829181"
level4 = "#939F91"

[theme.light.green]
# green for light mode
bright = "#8DA101"
normal = "#8DA101"

[theme.light.orange]
# orange for light mode
bright = "#F57D26"
normal = "#F57D26"

[theme.light.purple]
# purple for light mode
bright = "#DF69BA"
normal = "#DF69BA"

[theme.light.red]
# red for light mode
bright = "#F85552"
normal = "#F85552"

[theme.light.yellow]
# yellow for light mode
bright = "#DFA000"
normal = "#DFA000"

[theme.font]
family = "JetBrainsMono Nerd Font"

# ============================================================================
# VISUALIZER
# ============================================================================


[visualizer]
higher_cutoff_freq = 10000

lower_cutoff_freq = 50
monstercat = 0.0
noise_reduction = 0.77
waves = false

# Dark mode visualizer: Forest greens and aquas

[visualizer.bars]
bar_spacing = 2.0
gradient_mode = "wave"
border_width = 1.0
led_bars = true
led_segment_height = 2.0
peak_gradient_mode = "cycle"
peak_mode = "fall"
peak_hold_time = 500
peak_fade_time = 750
bar_depth_3d = 0.0
peak_height_ratio = 66

[visualizer.bars.dark]
border_color = "#232A2E"
border_opacity = 1.0
led_border_opacity = 1.0
bar_gradient_colors = [
    "#A7C080",
    "#A7C080",
    "#83C092",
    "#83C092",
    "#7FBBB3",
    "#7FBBB3",
]
peak_gradient_colors = [
    "#DBBC7F",
    "#DBBC7F",
    "#E69875",
    "#E69875",
    "#E67E80",
    "#E67E80",
]

[visualizer.bars.light]
border_color = "#FDF6E3"
border_opacity = 0.0
led_border_opacity = 0.0
bar_gradient_colors = [
    "#8DA101",
    "#8DA101",
    "#35A77C",
    "#35A77C",
    "#3A94C5",
    "#3A94C5",
]
peak_gradient_colors = [
    "#DFA000",
    "#DFA000",
    "#F57D26",
    "#F57D26",
    "#F85552",
    "#F85552",
]

[visualizer.lines]
line_thickness = 0.025
point_count = 32

