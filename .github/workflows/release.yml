name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=manual-$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          fi

      - name: Verify version bump policy
        if: github.event_name == 'push'
        run: |
          set -euo pipefail

          new="${RELEASE_TAG#v}"
          IFS='.' read -r new_major new_minor new_patch <<<"$new"

          if prev_full=$(git describe --tags --abbrev=0 "${RELEASE_TAG}^" 2>/dev/null); then
            prev="${prev_full#v}"
            IFS='.' read -r prev_major prev_minor prev_patch <<<"$prev"
            echo "Previous tag: $prev_full"
          else
            echo "No previous tag — first release, skipping bump check."
            exit 0
          fi

          echo "New tag:      $RELEASE_TAG"

          if [ "$new_major" -gt "$prev_major" ]; then
            kind=major
          elif [ "$new_major" -eq "$prev_major" ] && [ "$new_minor" -gt "$prev_minor" ]; then
            kind=minor
          elif [ "$new_major" -eq "$prev_major" ] && [ "$new_minor" -eq "$prev_minor" ] && [ "$new_patch" -gt "$prev_patch" ]; then
            kind=patch
          else
            echo "::error::Tag $RELEASE_TAG does not strictly succeed $prev_full"
            exit 1
          fi

          echo "Bump kind:    $kind"

          if [ "$kind" = "patch" ]; then
            exit 0
          fi

          marker="allow-${kind}-bump"
          body=$(git tag -l --format='%(contents)' "$RELEASE_TAG" || true)
          if printf '%s\n' "$body" | grep -Fq "$marker"; then
            echo "Authorization marker found: $marker"
            exit 0
          fi

          echo "::error::$kind bump from $prev_full to $RELEASE_TAG requires '$marker' in the annotated tag message body."
          echo "::error::Recover with:"
          echo "::error::  git push --delete origin $RELEASE_TAG && git tag -d $RELEASE_TAG"
          echo "::error::  git tag -a $RELEASE_TAG -m \"$marker: <reason>\" && git push origin $RELEASE_TAG"
          exit 1

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpipewire-0.3-dev libfontconfig1-dev pkg-config libasound2-dev cmake

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Stage tarball
        run: |
          STAGE="nokkvi-${RELEASE_TAG}-x86_64-unknown-linux-gnu"
          mkdir -p "$STAGE"
          cp target/release/nokkvi "$STAGE/"
          cp -r assets themes "$STAGE/"
          cp install.sh "$STAGE/"
          cp README.md CHANGELOG.md LICENSE "$STAGE/"
          tar czf "${STAGE}.tar.gz" "$STAGE"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
          echo "ASSET=${STAGE}.tar.gz" >> "$GITHUB_ENV"
          echo "CHECKSUM=${STAGE}.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Extract release notes from CHANGELOG
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            HEADER="[Unreleased]"
          else
            HEADER="$RELEASE_TAG"
          fi
          awk -v header="$HEADER" '
            BEGIN { prefix = "## " header }
            !found && (index($0, prefix " ") == 1 || $0 == prefix) { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          echo "--- release-notes.md ---"
          cat release-notes.md

      - name: Upload workflow artifact (dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: nokkvi-${{ env.RELEASE_TAG }}
          path: |
            ${{ env.ASSET }}
            ${{ env.CHECKSUM }}

      - name: Create draft release (tag push)
        if: github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.RELEASE_TAG }}
          draft: true
          allowUpdates: true
          bodyFile: release-notes.md
          artifacts: ${{ env.ASSET }},${{ env.CHECKSUM }}

      - name: Trigger docs rebuild
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.DOCS_TRIGGER_TOKEN }}
        run: |
          gh api repos/f-o-o-g-s/nokkvi-docs/dispatches \
            -f event_type=docs_update
