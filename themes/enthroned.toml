# Enthroned — derived from the cover of Soudiere - "PIRELLI VOL. 8" (2024): a
# scarlet-robed reaper on a gothic throne, flanked by skeletal nuns, over a
# hellish near-black mountainscape lit by a blood eclipse. A dark phonk record,
# so the theme is unapologetically funereal: a warm near-black canvas (the void
# and black frame, sampled ~#0C0C0C / #240C0C) under warm aged-ivory bone text:
# a dirty aged bone keyed to the reaper's own skull/hands (~#D9CCAA, b* +18 yellow),
# not a bleached white.
#
# Every red in the painting is WARM (the robe/title sample ~#BC2B1C at hue ~6 deg;
# the eclipse/firelit rim ~#9C240C / #84240C at ~11-13 deg), so the palette stays
# inside that warm band and lets state read by hue POSITION, not by cooling out of
# gamut:
#   - accent  = the robe/title SCARLET (#BE261B / #DA3A24) — links, active nav, the
#     now-playing + selection fills. Warm and deep, the way the robe reads.
#   - danger  = the hotter EMBER-ORANGE of the eclipse glow (#DF5620), pushed ~13 deg
#     past the accent so an error is the *oranger, brighter* red, never hidden in it.
# success is a muted MORGUE-GREEN lifted from the sickly nun flesh (~#383A34, itself
# too dark to use, so raised to an indicator green that stays cold and sickly, not
# cheerful). warning + star are the tarnished BRONZE-GOLD of the throne filigree
# (~#543C24) — the one warm metal in the scene — with star pulled to a brighter
# rating-gold so it reads distinct from an amber warning.
#
# Visualizer — unique but unmistakably this cover: bars rise from shadowed oxblood
# through the crimson robe to a firelit ember tip (a river of blood catching the
# eclipse), and the peak caps are the warm aged-ivory skull (~#D9CCAA) hovering
# above the blood. Dark uses black inter-bar seams for a hellish-LED read; light
# inverts to oxblood caps on a bone-to-ember field.
#
# The light section is a coherent "bleached bone" companion: aged bone/parchment
# stained with dried blood — warm bone surfaces, blackened-blood ink, deep-crimson
# accents that DEEPEN (not brighten) to oxblood so they read as dark-on-light links.
# Every pair was checked against Nokkvi's contrast machinery (WCAG luminance, the
# derived playing/selected fills, the 3:1 selection ring, AA text floors) and
# adversarially reviewed by an art-authenticity, an accessibility, and a
# theme-cohesion pass.
name = "Enthroned"

[dark]
border = "#1C0E0C"

[dark.background]
hard = "#0A0605"
default = "#120B0A"
soft = "#1A1210"
level1 = "#221715"
level2 = "#2A1D1A"
level3 = "#33231F"

[dark.foreground]
bright = "#E2D3B6"
level1 = "#C8BAA2"
level2 = "#AEA592"
level3 = "#8B8378"
level4 = "#70675E"

[dark.accent]
primary = "#BE261B"
bright = "#DA3A24"
border_light = "#DE4028"
now_playing = "#BE261B"
selected = "#DA3A24"

[dark.danger]
base = "#DF5620"
bright = "#F2703A"

[dark.success]
base = "#6F8478"
bright = "#8CA093"

[dark.warning]
base = "#C88A34"
bright = "#E4AB4E"

[dark.star]
base = "#CE9E30"
bright = "#EABE52"

[dark.visualizer]
bar_gradient_colors = ["#3A0C0C", "#701414", "#9C1A1A", "#C0281C", "#DB3A28", "#EE5A34"]
border_color = "#080505"
border_opacity = 1.0
led_border_opacity = 1.0
peak_gradient_colors = ["#EDDEC3", "#D8C7A8", "#EDDEC3", "#D8C7A8", "#EDDEC3", "#D8C7A8"]

[light]
